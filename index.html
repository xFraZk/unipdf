<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unir PDF | Gratis</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

    <style>
        :root {
            --bg-color: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #ffffff;
            --secondary: #a1a1aa;
            --accent: #3b82f6;
            --radius-bento: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

  
        .ambient-light {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

     
        .bento-container {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto 1fr auto;
            gap: 16px;
            width: 100%;
            max-width: 900px;
            padding: 24px;
            height: 80vh;
        }

     
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-bento);
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

    
        .header {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header h1 {
            font-weight: 600;
            font-size: 24px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--secondary);
            font-size: 14px;
            margin-top: 4px;
        }

  
        .dropzone {
            grid-column: 1 / 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px dashed var(--glass-border);
            cursor: pointer;
            text-align: center;
        }

        .dropzone:hover, .dropzone.dragover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent);
        }

        .dropzone i {
            font-size: 48px;
            color: var(--secondary);
            margin-bottom: 16px;
            transition: color 0.3s ease;
        }

        .dropzone:hover i {
            color: var(--primary);
        }

        input[type="file"] {
            display: none;
        }

     
        .file-list-container {
            grid-column: 2 / 3;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

    
        .file-list-container::-webkit-scrollbar {
            width: 6px;
        }
        .file-list-container::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            padding: 16px;
            border-radius: 16px;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .file-info span {
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .remove-btn {
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            font-size: 20px;
            transition: color 0.2s ease;
        }

        .remove-btn:hover {
            color: #ef4444;
        }

     
        .action-panel {
            grid-column: 1 / -1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .btn-merge {
            background: var(--primary);
            color: var(--bg-color);
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .btn-merge:hover {
            transform: scale(1.02);
        }

        .btn-merge:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 768px) {
            .bento-container {
                grid-template-columns: 1fr;
                height: 95vh;
            }
            .dropzone, .file-list-container {
                grid-column: 1 / -1;
            }
        }
    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <div class="bento-container">
        <div class="glass-panel header">
            <h1>Fusion PDF</h1>
            <p>Une tus documentos sin límites, sin servidores, totalmente privado.</p>
        </div>

        <div class="glass-panel dropzone" id="dropzone">
            <i class="ph ph-file-pdf"></i>
            <p>Arrastra tus PDFs aquí</p>
            <p style="font-size: 12px; color: var(--secondary); margin-top: 8px;">o haz clic para explorar</p>
            <input type="file" id="fileInput" multiple accept="application/pdf">
        </div>

        <div class="glass-panel file-list-container" id="fileList">
            <div style="color: var(--secondary); font-size: 14px; text-align: center; margin-top: auto; margin-bottom: auto;" id="emptyState">
                Aún no hay archivos cargados.
            </div>
        </div>

        <div class="glass-panel action-panel">
            <button class="btn-merge" id="mergeBtn" disabled>
                <i class="ph ph-magic-wand"></i> Unir y Descargar
            </button>
        </div>
    </div>

    <script>
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const emptyState = document.getElementById('emptyState');
        const mergeBtn = document.getElementById('mergeBtn');
        
        let filesArray = [];

        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                if (file.type === 'application/pdf') {
                    filesArray.push(file);
                } else {
                    alert('Solo se permiten archivos PDF.');
                }
            }
            renderFileList();
        }

        function removeFile(index) {
            filesArray.splice(index, 1);
            renderFileList();
        }

        function renderFileList() {
            if (filesArray.length > 0) {
                emptyState.style.display = 'none';
                mergeBtn.disabled = filesArray.length < 2; 
            } else {
                emptyState.style.display = 'block';
                mergeBtn.disabled = true;
            }

        
            const items = fileList.querySelectorAll('.file-item');
            items.forEach(item => item.remove());

            filesArray.forEach((file, index) => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-info">
                        <i class="ph ph-file-text" style="color: var(--secondary); font-size: 20px;"></i>
                        <span>${file.name}</span>
                    </div>
                    <button class="remove-btn" onclick="removeFile(${index})">
                        <i class="ph ph-x-circle"></i>
                    </button>
                `;
                fileList.appendChild(fileItem);
            });
        }

    
        mergeBtn.addEventListener('click', async () => {
            mergeBtn.innerHTML = '<i class="ph ph-spinner-gap" style="animation: spin 1s linear infinite;"></i> Procesando...';
            mergeBtn.disabled = true;

            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                for (let file of filesArray) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                const pdfBytes = await mergedPdf.save();
                
                // Trigger Download
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `fusionado_${new Date().getTime()}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error("Error al unir PDFs:", error);
                alert("Hubo un error al procesar los archivos.");
            } finally {
                mergeBtn.innerHTML = '<i class="ph ph-magic-wand"></i> Unir y Descargar';
                mergeBtn.disabled = false;
            }
        });

        // Keyframe extra para el spinner
        const style = document.createElement('style');
        style.innerHTML = `@keyframes spin { 100% { transform: rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
